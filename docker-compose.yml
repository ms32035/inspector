version: '3'


services:
  inspector: &inspector
    build:
      context: .
      dockerfile: compose/master/inspector/Dockerfile
    image: ms32035/inpector:master
    env_file:
      - .envs/django
      - .envs/postgres
    ports:
      - "5000:5000"
    command: /start

  celeryworker:
    <<: *inspector
    image: ms32035/inpector:master
    ports: []
    command: /start-celeryworker

  celerybeat:
    <<: *inspector
    image: ms32035/inpector:master
    ports: []
    command: /start-celerybeat

  flower:
    <<: *inspector
    image: ms32035/inpector:master
    ports:
      - "5555:5555"
    command: /start-flower

  postgres:
    image: postgres:12
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file:
      - .envs/postgres

  redis:
    image: redis:5


volumes:
  pgdata: {}
