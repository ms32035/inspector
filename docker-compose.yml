version: '3'


services:
  inspector: &inspector
    build:
      context: .
      dockerfile: compose/master/inspector/Dockerfile
    image: ${DOCKER_REPO}:master
    env_file:
      - .envs/.inspector/.django
      - .envs/.inspector/.postgres
    ports:
      - "5000:5000"
    command: /start

  celeryworker:
    <<: *inspector
    image: ${DOCKER_REPO}:master
    ports: []
    command: /start-celeryworker

  celerybeat:
    <<: *inspector
    image: ${DOCKER_REPO}:master
    ports: []
    command: /start-celerybeat

  flower:
    <<: *inspector
    image: ${DOCKER_REPO}:master
    ports:
      - "5555:5555"
    command: /start-flower
